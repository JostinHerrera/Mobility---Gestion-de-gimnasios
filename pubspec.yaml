name: gestion_gym
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.0.0
  url_launcher: ^6.2.2
  google_maps_flutter: ^2.5.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  # cloud_firestore removed: using Firestore REST via HTTP to avoid SDK version conflicts
  flutter_dotenv: ^5.0.2
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/